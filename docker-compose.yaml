version: '3.8'

services:
  db:
    image: postgres:17
    container_name: feedback-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 1234 #this is just for test, edited in deployment
      POSTGRES_DB: test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d test"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  app:
    build: .
    container_name: feedback-app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
